openapi: 3.0.0
info:
  description: This API provides hockey event info from the Kafka queue
  version: "1.0.0"
  title: Hockey Analyzer API

paths:
  /hockey/shots:
    get:
      summary: gets a shot event from history
      operationId: app.get_shot_reading
      description: Gets shot events from the Kafka queue
      parameters:
        - name: index
          in: query
          description: Gets the shot at the index in the Kafka queue
          required: true
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Successfully returned a shot event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShotReading"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /hockey/penalties:
    get:
      summary: gets a penalty event from history
      operationId: app.get_penalty_reading
      description: Gets penalty events from the Kafka queue
      parameters:
        - name: index
          in: query
          description: Gets the penalty at the index in the Kafka queue
          required: true
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Successfully returned a penalty event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PenaltyReading"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /stats:
    get:
      summary: gets the reading stats
      operationId: app.get_reading_stats
      description: Gets the stats of the events currently in the queue
      responses:
        "200":
          description: Successfully returned the statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /health:
    get:
      summary: Health check endpoint
      operationId: app.check_health
      description: Returns 200 if the service is running
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
              

components:
  schemas:
    ShotReading:
      type: object
      required:
        - arena_id
        - game_id
        - shot_type
      properties:
        arena_id:
          type: string
          example: "arena-123"
        game_id:
          type: integer
          example: 54321
        shot_type:
          type: string
          example: "slap"
        trace_id:
          type: string
          format: uuid

    PenaltyReading:
      type: object
      required:
        - arena_id
        - game_id
        - penalty_type
      properties:
        arena_id:
          type: string
          example: "arena-123"
        game_id:
          type: integer
          example: 54321
        penalty_type:
          type: string
          example: "Tripping"
        trace_id:
          type: string
          format: uuid

    Stats:
      type: object
      required:
        - num_shot_readings
        - num_penalty_readings
      properties:
        num_shot_readings:
          type: integer
          example: 10
        num_penalty_readings:
          type: integer
          example: 5