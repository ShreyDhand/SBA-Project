version: '3.8'

services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/data

  kafka:
    image: wurstmeister/kafka
    command: ["start-kafka.sh"]
    ports:
      - "9092:9092"
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1"
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kafka-data:/kafka
    depends_on:
      - zookeeper

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hockey_storage
      MYSQL_USER: hockey_user
      MYSQL_PASSWORD: hockey_pass
    ports:
      - "3307:3306"
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  receiver:
    build: receiver
    ports:
      - "8080:8080"
    volumes:
      - ./config/receiver_config.yml:/config/receiver_config.yml
      - ./config/receiver_log_config.yml:/config/receiver_log_config.yml
      - ./logs:/logs
    depends_on:
      - kafka

  storage:
    build: storage
    volumes:
      - ./config/storage_config.yml:/config/storage_config.yml
      - ./config/storage_log_config.yml:/config/storage_log_config.yml
      - ./logs:/logs
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started

  processing:
    build: processing
    ports:
      - "8100:8100"
    volumes:
      - ./config/processing_config.yml:/config/processing_config.yml
      - ./config/processing_log_config.yml:/config/processing_log_config.yml
      - ./logs:/logs
      - ./data/processing:/data
    depends_on:
      - storage

  analyzer:
    build: analyzer
    ports:
      - "8110:8110"
    volumes:
      - ./config/analyzer_config.yml:/config/analyzer_config.yml
      - ./config/analyzer_log_config.yml:/config/analyzer_log_config.yml
      - ./logs:/logs

  dashboard:
    build: ./dashboard-ui
    ports:
      - "3000:80"
    depends_on:
      - processing
      - analyzer

  health-check:
    build: health-check
    ports:
      - "8120:8120"
    volumes:
      - ./health-check/app_conf.yml:/app/app_conf.yml
      - ./health-check/log_conf.yml:/app/log_conf.yml
      - ./health-check/health_status.json:/app/health_status.json
      - ./logs:/logs
    depends_on:
      - receiver
      - storage
      - processing
      - analyzer

volumes:
  my-db:
  kafka-data:
  zookeeper-data: